name: Build & Release Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Setup Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: "v3-rust"

      - name: Remove stale cargo config
        shell: pwsh
        run: |
          $cfg = "$env:USERPROFILE\.cargo\config.toml"
          if (Test-Path $cfg) { Remove-Item $cfg -Force; Write-Host "Removed stale config.toml" }

      - name: Find MSVC link.exe
        shell: pwsh
        run: |
          $searchRoots = @(
            "C:\Program Files\Microsoft Visual Studio",
            "C:\Program Files (x86)\Microsoft Visual Studio"
          )
          $found = $null
          foreach ($root in $searchRoots) {
            if (Test-Path $root) {
              $found = Get-ChildItem $root -Recurse -Filter "link.exe" -ErrorAction SilentlyContinue |
                Where-Object { $_.FullName -match "Hostx64\\x64" } |
                Select-Object -First 1
              if ($found) { break }
            }
          }
          if ($found) {
            $escaped = $found.FullName
            echo "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=$escaped" >> $env:GITHUB_ENV
            echo "$($found.DirectoryName)" >> $env:GITHUB_PATH
          } else {
            Write-Error "link.exe NOT found"; exit 1
          }

      - name: Install npm dependencies
        run: npm ci

      - name: Build Go backend (Windows x64)
        working-directory: backend
        shell: pwsh
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          New-Item -ItemType Directory -Force -Path "..\src-tauri\backend-bin"
          go build -ldflags="-s -w -H windowsgui" -o "..\src-tauri\backend-bin\nexus-backend.exe" .
          Get-Item "..\src-tauri\backend-bin\nexus-backend.exe" | Select-Object Name, Length

      - name: Build Tauri app (npm)
        shell: pwsh
        env:
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER: ${{ env.CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER }}
          VITE_ADMIN_EMAIL: ${{ secrets.VITE_ADMIN_EMAIL }}
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PADDLE_CLIENT_TOKEN: ${{ secrets.VITE_PADDLE_CLIENT_TOKEN }}
          VITE_PADDLE_PRICE_ID: ${{ secrets.VITE_PADDLE_PRICE_ID }}
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: Find built installer
        id: find_exe
        shell: pwsh
        run: |
          $paths = @(
            "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis",
            "src-tauri/target/release/bundle/nsis"
          )
          $exePath = $null
          foreach ($p in $paths) {
            $exe = Get-ChildItem $p -Filter "*setup.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($exe) {
              $exePath = $exe.FullName
              echo "EXE_PATH=$exePath" >> $env:GITHUB_ENV
              echo "EXE_NAME=$($exe.Name)" >> $env:GITHUB_ENV
              Write-Host "Found: $exePath"
              break
            }
          }
          if (-not $exePath) { Write-Error "No setup.exe found!"; exit 1 }

      - name: Publish release to nexus-ai-releases (Public repo)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          TAG: ${{ github.ref_name }}
        run: |
          $version = $env:TAG
          $exePath = $env:EXE_PATH
          $exeName = "Nexus_x64-setup.exe"

          # 파일명을 고정 이름으로 복사 (PowerShell에서 # 구문이 동작하지 않는 문제 우회)
          $destPath = Join-Path (Split-Path $exePath) $exeName
          Copy-Item $exePath $destPath -Force

          gh release create $version $destPath `
            --repo sansarang/nexus-ai-releases `
            --title "Nexus AI $version" `
            --notes "## Nexus AI $version

          ### 설치 방법
          1. 아래 ``Nexus_x64-setup.exe`` 다운로드
          2. 더블클릭 -> 다음 -> 설치 완료
          3. Google 계정으로 로그인 후 시작

          ### 시스템 요구사항
          - Windows 10/11 64-bit
          - 인터넷 연결 필요

          [전체 기능 보기 -> nexusai.ai.kr](https://nexusai.ai.kr)" `
            --latest

      - name: Upload artifact (workflow_dispatch용)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Windows-Installer
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 14
