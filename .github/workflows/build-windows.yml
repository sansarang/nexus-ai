name: Build & Release Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Setup Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Visual Studio Build Tools (MSVC linker)
        run: |
          choco install visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --quiet" -y --no-progress
        shell: powershell

      - name: Install npm dependencies
        run: npm ci

      - name: Build Go backend (Windows x64, CGO disabled)
        working-directory: backend
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          New-Item -ItemType Directory -Force -Path "..\src-tauri\backend-bin"
          go build -ldflags="-s -w -H windowsgui" -o "..\src-tauri\backend-bin\nexus-backend.exe" .
          Get-Item "..\src-tauri\backend-bin\nexus-backend.exe" | Select-Object Name, Length
        shell: powershell

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Nexus AI ${{ github.ref_name }}'
          releaseBody: |
            ## Nexus AI ${{ github.ref_name }} 출시

            ### 설치 방법
            1. 아래 `Nexus_*_x64-setup.exe` 파일을 다운로드
            2. 더블클릭 → 다음 → 다음 → 설치 완료
            3. "Nexus 실행" 체크 후 마침 클릭

            ### 시스템 요구사항
            - Windows 10/11 64-bit
            - 인터넷 연결 (Groq AI API 사용 시)
            - 관리자 권한 불필요
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

      - name: Upload installer artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Windows-Installer
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 14
