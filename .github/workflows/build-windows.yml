name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Release 생성을 위한 권한 (Phase 14 이후 추가)
# 기존엔 contents:read 만 있어서 softprops/action-gh-release 403 실패
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Python (for sidecar build — Option A)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install LLVM
        run: choco install llvm -y

      - name: Set LLVM PATH
        run: |
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Go backend
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri\binaries | Out-Null
          New-Item -ItemType Directory -Force -Path src-tauri\backend-bin | Out-Null
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          cd backend
          go mod tidy
          go build -tags windows -ldflags="-s -w" -o "..\src-tauri\binaries\backend-x86_64-pc-windows-msvc.exe" .
          cd ..
          Copy-Item "src-tauri\binaries\backend-x86_64-pc-windows-msvc.exe" "src-tauri\backend-bin\nexus-backend.exe"

      # Option A: 진짜 Python 사이드카 빌드 (PyInstaller)
      # 이전: Go 백엔드를 nexus-python.exe로 복사 (가짜 Python)
      # 이후: 실제 main.py + 26개 라우트 (OCR/PDF/임베딩/yt-dlp/주식/이메일AI 등)
      - name: Build Python sidecar (PyInstaller)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cd backend/nexus_python
          Write-Host "📦 Installing Python deps (5-10 min, heavy ML libs)..."
          python -m pip install --upgrade pip setuptools wheel
          # 의존성 일부는 빌드 환경에서 깨질 수 있음 → 핵심만 강제 설치
          pip install --no-cache-dir `
            fastapi==0.115.0 uvicorn==0.30.6 requests==2.32.3 `
            httpx==0.27.2 aiofiles==24.1.0 python-multipart==0.0.12 `
            pyyaml==6.0.2 sqlalchemy==2.0.36 pillow==10.4.0 numpy==1.26.4 `
            yt-dlp==2024.11.4 ytmusicapi==1.7.4 `
            PyMuPDF==1.24.11 pandas==2.2.3 openpyxl==3.1.5 `
            yfinance==0.2.43 groq==0.11.0 ollama==0.3.3 pyautogui==0.9.54 pygetwindow==0.0.9
          # 무거운 ML 의존성 (easyocr, faiss, sentence-transformers) — 실패해도 빌드 계속
          pip install --no-cache-dir easyocr==1.7.2 faiss-cpu==1.9.0 sentence-transformers==3.2.1 scikit-learn==1.5.2 2>&1 | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "⚠️ Heavy ML deps failed — sidecar will work without OCR/embeddings (graceful degradation)"
          }
          pip install pyinstaller==6.10.0
          Write-Host "🔨 PyInstaller 빌드 시작 (5-10 min)..."
          pyinstaller --onefile --name nexus-python --noconfirm `
            --hidden-import=uvicorn --hidden-import=uvicorn.lifespan `
            --hidden-import=uvicorn.lifespan.on --hidden-import=uvicorn.lifespan.off `
            --hidden-import=uvicorn.protocols --hidden-import=uvicorn.protocols.http `
            --hidden-import=uvicorn.protocols.http.auto --hidden-import=uvicorn.protocols.http.h11_impl `
            --hidden-import=uvicorn.protocols.websockets --hidden-import=uvicorn.protocols.websockets.auto `
            --hidden-import=uvicorn.protocols.websockets.wsproto_impl `
            --hidden-import=uvicorn.loops --hidden-import=uvicorn.loops.auto `
            --hidden-import=uvicorn.loops.asyncio `
            --collect-data fastapi `
            --collect-all yt_dlp --collect-all ytmusicapi `
            main.py
          if (Test-Path "dist\nexus-python.exe") {
            $size = (Get-Item "dist\nexus-python.exe").Length / 1MB
            Write-Host "✅ Python sidecar built: $([math]::Round($size, 1)) MB"
            Copy-Item "dist\nexus-python.exe" "..\..\src-tauri\backend-bin\nexus-python.exe" -Force
          } else {
            Write-Host "❌ Python build failed — falling back to Go copy (no Python features)"
            Copy-Item "..\..\src-tauri\backend-bin\nexus-backend.exe" "..\..\src-tauri\backend-bin\nexus-python.exe" -Force
          }
          cd ..\..

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        run: npx tauri build --target x86_64-pc-windows-msvc

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Windows-x64-Setup
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.7.1-build${{ github.run_number }}
          name: "NEXUS AI v2.7.1 (build ${{ github.run_number }})"
          files: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          body: |
            - admin 플랜 무제한(99999회/일)
            - JWT app_metadata 파싱 추가
            - 설치 파일 잠금 수정
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
