name: Build & Release Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Setup Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          prefix-key: "v3-rust"  # bump to bust stale cache with bad config.toml

      - name: Remove stale cargo config (BOM 방지)
        shell: pwsh
        run: |
          $cfg = "$env:USERPROFILE\.cargo\config.toml"
          if (Test-Path $cfg) { Remove-Item $cfg -Force; Write-Host "Removed stale config.toml" }
          # 프로젝트 레벨 cargo config도 확인
          $projCfg = ".cargo\config.toml"
          if (Test-Path $projCfg) { Write-Host "Project config exists: $projCfg" }

      - name: Find MSVC link.exe and export to GITHUB_ENV
        shell: pwsh
        run: |
          $searchRoots = @(
            "C:\Program Files\Microsoft Visual Studio",
            "C:\Program Files (x86)\Microsoft Visual Studio"
          )
          $found = $null
          foreach ($root in $searchRoots) {
            if (Test-Path $root) {
              $found = Get-ChildItem $root -Recurse -Filter "link.exe" -ErrorAction SilentlyContinue |
                Where-Object { $_.FullName -match "Hostx64\\x64" } |
                Select-Object -First 1
              if ($found) { break }
            }
          }
          if ($found) {
            Write-Host "Found: $($found.FullName)"
            $escaped = $found.FullName
            echo "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=$escaped" >> $env:GITHUB_ENV
            $dir = $found.DirectoryName
            echo "$dir" >> $env:GITHUB_PATH
            Write-Host "Linker set to: $escaped"
          } else {
            Write-Error "link.exe NOT found on runner!"
            Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue | Where-Object { $_.Name -eq "link.exe" } | Select-Object FullName
            exit 1
          }

      - name: Install npm dependencies
        run: npm ci

      - name: Build Go backend (Windows x64)
        working-directory: backend
        shell: pwsh
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          New-Item -ItemType Directory -Force -Path "..\src-tauri\backend-bin"
          go build -ldflags="-s -w -H windowsgui" -o "..\src-tauri\backend-bin\nexus-backend.exe" .
          Get-Item "..\src-tauri\backend-bin\nexus-backend.exe" | Select-Object Name, Length

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER: ${{ env.CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER }}
          VITE_PPLX_KEY: ${{ secrets.VITE_PPLX_KEY }}
          VITE_OPENAI_KEY: ${{ secrets.VITE_OPENAI_KEY }}
          VITE_TAVILY_KEY: ${{ secrets.VITE_TAVILY_KEY }}
          VITE_ADMIN_EMAIL: ${{ secrets.VITE_ADMIN_EMAIL }}
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PADDLE_CLIENT_TOKEN: ${{ secrets.VITE_PADDLE_CLIENT_TOKEN }}
          VITE_PADDLE_PRICE_ID: ${{ secrets.VITE_PADDLE_PRICE_ID }}
        with:
          tagName: ${{ github.ref_name != 'main' && github.ref_name || 'v2.5.0' }}
          releaseName: 'Nexus AI ${{ github.ref_name != ''main'' && github.ref_name || ''v2.5.0'' }}'
          releaseBody: |
            ## Nexus AI 출시

            ### 설치 방법
            1. 아래 `Nexus_*_x64-setup.exe` 파일을 다운로드
            2. 더블클릭 → 다음 → 다음 → 설치 완료
            3. "Nexus 실행" 체크 후 마침 클릭

            ### 시스템 요구사항
            - Windows 10/11 64-bit
            - 인터넷 연결 필요
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

      - name: Upload installer artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Windows-Installer
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 14
