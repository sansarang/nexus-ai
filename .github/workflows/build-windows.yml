name: Build Windows Installer

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Release 생성을 위한 권한 (Phase 14 이후 추가)
# 기존엔 contents:read 만 있어서 softprops/action-gh-release 403 실패
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install LLVM
        run: choco install llvm -y

      - name: Set LLVM PATH
        run: |
          echo "C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Go backend
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri\binaries | Out-Null
          New-Item -ItemType Directory -Force -Path src-tauri\backend-bin | Out-Null
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          cd backend
          go mod tidy
          go build -tags windows -ldflags="-s -w" -o "..\src-tauri\binaries\backend-x86_64-pc-windows-msvc.exe" .
          cd ..
          Copy-Item "src-tauri\binaries\backend-x86_64-pc-windows-msvc.exe" "src-tauri\backend-bin\nexus-backend.exe"
          Copy-Item "src-tauri\backend-bin\nexus-backend.exe" "src-tauri\backend-bin\nexus-python.exe"

      - name: Install npm dependencies
        run: npm install

      - name: Build Tauri app
        run: npx tauri build --target x86_64-pc-windows-msvc

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Windows-x64-Setup
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.7.1-build${{ github.run_number }}
          name: "NEXUS AI v2.7.1 (build ${{ github.run_number }})"
          files: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          body: |
            - admin 플랜 무제한(99999회/일)
            - JWT app_metadata 파싱 추가
            - 설치 파일 잠금 수정
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
