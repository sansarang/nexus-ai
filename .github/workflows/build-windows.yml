name: Build & Release Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Setup Rust (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Find MSVC linker and set Cargo config
        shell: pwsh
        run: |
          $link = Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter "link.exe" -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "Hostx64\\x64" } |
            Select-Object -First 1
          if (-not $link) {
            $link = Get-ChildItem "C:\Program Files (x86)\Microsoft Visual Studio" -Recurse -Filter "link.exe" -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "Hostx64\\x64" } |
              Select-Object -First 1
          }
          if ($link) {
            $linkPath = $link.FullName -replace '\\', '/'
            Write-Host "Found link.exe: $linkPath"
            $cargoDir = "$env:USERPROFILE\.cargo"
            New-Item -ItemType Directory -Force -Path $cargoDir | Out-Null
            $configContent = @"
[target.x86_64-pc-windows-msvc]
linker = "$linkPath"
"@
            Set-Content -Path "$cargoDir\config.toml" -Value $configContent
            Write-Host "Cargo config written."
          } else {
            Write-Error "link.exe not found!"
            exit 1
          }

      - name: Install npm dependencies
        run: npm ci

      - name: Build Go backend (Windows x64)
        working-directory: backend
        shell: pwsh
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          New-Item -ItemType Directory -Force -Path "..\src-tauri\backend-bin"
          go build -ldflags="-s -w -H windowsgui" -o "..\src-tauri\backend-bin\nexus-backend.exe" .
          Get-Item "..\src-tauri\backend-bin\nexus-backend.exe" | Select-Object Name, Length

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Nexus AI ${{ github.ref_name }}'
          releaseBody: |
            ## Nexus AI ${{ github.ref_name }} 출시

            ### 설치 방법
            1. 아래 `Nexus_*_x64-setup.exe` 파일을 다운로드
            2. 더블클릭 → 다음 → 다음 → 설치 완료
            3. "Nexus 실행" 체크 후 마침 클릭

            ### 시스템 요구사항
            - Windows 10/11 64-bit
            - 인터넷 연결 필요
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

      - name: Upload installer artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Nexus-Windows-Installer
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 14
